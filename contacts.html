<div class="orizontal-line-white"></div>

<section id="contact" class="space">
    <h2 class="h2 contactSize">Compila il form con i tuoi dati per contattarmi.</h2>
    <div class="containerForm">
        <div class="containerGroup">
            <div class="column-left altezzaIMG">
                <img src="img/imgcontacts.jpg" class="contact-img">
            </div>

            <div class="column-right">
                <form name="modulo">
                    <div class="form-group">
                        <label for="nome" class="h4">Nome <span>*</span></label>
                        <input type="text" placeholder="Nome" id="nome" name="nome" required>
                        <div id="feedback"></div>
                    </div>
                    <div class="form-group">
                        <label for="cognome" class="h4">Cognome <span>*</span></label>
                        <input type="text" placeholder="Cognome" id="cognome" name="cognome" required>
                        <div id="feedback1"></div>
                    </div>
                    <div class="form-group">
                        <label for="email" class="h4">Email <span>*</span></label>
                        <input type="email" placeholder="Email" id="email" name="email" required>
                        <div id="feedback2"></div>
                    </div>
                    <div class="form-group">
                        <label for="messaggio" class="h4">Messaggio</label>
                        <textarea id="messaggio" placeholder="Scrivi qui il tuo messaggio..." name="messaggio"></textarea>
                    </div>
                    <button onclick="sendEmail()">Invia</button>
                </form>
            </div>
        </div>
    </div>
</section>
